{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'GymControl/css/login.css' %}">
</head>
<body>

    <div class="login-container">

        <h1>Login</h1>

        {% if form.errors %}
            <p class="error">Usuário ou senha inválidos.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
        <p>
            <a href="{% url 'GymControl:password_reset' %}">Esqueci minha senha</a>
        </p>
        <p>
            Não tem conta?
            <a href="{% url 'GymControl:cadastro' %}">Criar conta</a>
        </p>

    </div>

</body>
</html>
