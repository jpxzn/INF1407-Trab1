{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Treinos do Aluno</title>
    <link rel="stylesheet" href="{% static 'Gymcontrol/css/treinos.css' %}">
    <link rel="stylesheet" href="{% static 'GymControl/css/links.css' %}">
</head>
<body>
    {% include 'GymControl/links.html' %}

    <div class="page-container">
        <h1>Treinos de {{ aluno.user.username }}</h1>

        <div class="create-button-container">
            <a href="{% url 'GymControl:criarTreino' aluno.id %}" class="main-link-button">
                + Criar treino
            </a>
        </div>

        <hr>

        <div class="treinos-list">
            {% for treino in treinos %}
                <div class="treino-card">
                    <a href="{% url 'GymControl:exerciciosTreino' treino.id %}">
                        <h2>{{ treino.nome }}</h2>
                    </a>

                    <div class="treino-actions">
                        <a href="{% url 'GymControl:editarTreino' treino.id %}" class="edit-link">
                            Editar
                        </a>

                        <form method="post" action="{% url 'GymControl:deletarTreino' treino.id %}">
                            {% csrf_token %}
                            <button type="submit" class="delete-button">Deletar</button>
                        </form>
                    </div>
                </div>
            {% empty %}
                <p class="empty-message">Nenhum treino encontrado para este aluno.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
