{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova senha</title>
    <link rel="stylesheet" href="{% static 'GymControl/css/login.css' %}">
</head>
<body>
    <div class="login-container">
        <h1>Definir nova senha</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Salvar nova senha</button>
        </form>
    </div>
</body>
</html>
