{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ treino.nome }}</title>
    <link rel="stylesheet" href="{% static 'GymControl/css/treinos.css' %}">
    <link rel="stylesheet" href="{% static 'GymControl/css/links.css' %}">
</head>
<body>

    {% include 'GymControl/links.html' %}

    <h1>{{ treino.nome }}</h1>

    {% for te in exercicios %}
        <div>
            <h3>{{ te.exercicio.nome }}</h3>
            <p>Séries: {{ te.qtd_series }}</p>
            <p>Repetições: {{ te.qtd_repeticoes }}</p>
        </div>
    {% empty %}
        <p>Nenhum exercício cadastrado.</p>
    {% endfor %}

</body>
</html>
