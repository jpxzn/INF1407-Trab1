{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editar exercício</title>
    <link rel="stylesheet" href="{% static 'GymControl/css/treinos.css' %}">
    <link rel="stylesheet" href="{% static 'GymControl/css/links.css' %}">
</head>
<body>
    {% include 'GymControl/links.html' %}

    <div class="form-page-container">
        <div class="form-card">
            <h1>Editar exercício do treino {{ treino.nome }}</h1>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="form-actions">
                    <button type="submit" class="save-button">Salvar</button>
                    <a href="{% url 'GymControl:exerciciosTreinoAdmin' treino.id %}" class="cancel-link">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
