{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar exercício</title>
    <link rel="stylesheet" href="{% static 'GymControl/css/treinos.css' %}">
    <link rel="stylesheet" href="{% static 'GymControl/css/links.css' %}">
</head>
<body>
    {% include 'GymControl/common/links.html' %}

    <div class="form-page-container">
        <a href="{% url 'GymControl:exerciciosTreinoAdmin' treino.id %}" class="back-link">← Voltar para os exercícios</a>

        <div class="form-card">
            <div class="page-header">
                <h1 class="page-title">Adicionar exercício</h1>
                <p class="page-subtitle">
                    Adicione um novo exercício ao treino <strong>{{ treino.nome }}</strong>.
                </p>
            </div>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="form-actions">
                    <button type="submit" class="save-button">Salvar</button>
                    <a href="{% url 'GymControl:exerciciosTreinoAdmin' treino.id %}" class="cancel-link">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
