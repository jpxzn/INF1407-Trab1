{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Criar conta</title>
    <link rel="stylesheet" href="{% static 'GymControl/css/registro.css' %}">
</head>
<body>
    <div class="login-container">
        <form method="post">
            {% csrf_token %}
            <form method="post">
                {% csrf_token %}

                <label>Usuário</label>
                {{ form.username }}

                <label>Email</label>
                {{ form.email }}

                <label>Senha</label>
                {{ form.password1 }}

                <label>Confirmar senha</label>
                {{ form.password2 }}

                {% if form.errors %}
                    <p class="error">Erro ao cadastrar</p>
                {% endif %}

                <button type="submit">Cadastrar</button>
            </form>
        <p>Já tem conta? <a href="{% url 'GymControl:login' %}">Fazer login</a></p>
    </div>
</body>
</html>
